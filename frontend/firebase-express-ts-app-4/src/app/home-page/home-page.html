<div class="min-h-screen bg-slate-50 px-4 py-10">
  <div class="mx-auto w-full max-w-xl">
    <div
      class="mb-6 flex items-center justify-between rounded-xl border border-slate-200 bg-white p-4 shadow-sm"
    >
      <p data-testid="signedin-text" class="text-sm text-slate-600">Signed in</p>
      <button
        data-testid="signout-btn"
        class="hover:cursor-pointer rounded-lg bg-slate-900 px-4 py-2 text-sm font-semibold text-white transition hover:bg-slate-800"
        (click)="this.authService.signout()"
      >
        sign out
      </button>
    </div>

    <div
      class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm sm:p-8"
      data-testid="home-title"
    >
      @if (currentOpinion) {
        <div class="mb-4">
          <p class="text-xs font-semibold uppercase tracking-wide text-slate-500">Author</p>
          <p data-testid="author-email" class="mt-1 text-sm font-medium text-slate-900">
            {{ currentOpinion.author.email }}
          </p>
        </div>

        <div class="mb-6">
          <p class="text-xs font-semibold uppercase tracking-wide text-slate-500">Opinion</p>
          <p data-testid="opinion" class="mt-2 text-lg font-semibold text-slate-900">
            “{{ currentOpinion.opinion }}”
          </p>
        </div>

        <div class="mb-6 flex items-center gap-3">
          <span
            data-testid="likecount"
            class="rounded-full bg-slate-100 px-3 py-1 text-sm text-slate-700"
          >
            Likes: {{ currentOpinion.likecount }}
          </span>
          <span class="text-xs text-slate-500">
            Card {{ currentIndex + 1 }} / {{ opinions.length }}
          </span>
        </div>

        <div class="flex gap-3">
          <button
            data-testid="dislike-btn"
            class="hover:cursor-pointer flex-1 rounded-xl border border-slate-200 bg-white px-4 py-2.5 text-sm font-semibold text-slate-700 transition hover:border-slate-300 hover:text-slate-900"
            (click)="dislikeCurrent()"
          >
            Dislike
          </button>
          <button
            data-testid="like-btn"
            class="hover:cursor-pointer flex-1 rounded-xl bg-slate-900 px-4 py-2.5 text-sm font-semibold text-white transition hover:bg-slate-800"
            (click)="likeCurrent()"
          >
            Like
          </button>
        </div>
      } @else {
        <p class="text-sm text-slate-600">No opinions available.</p>
      }
    </div>
  </div>
</div>
